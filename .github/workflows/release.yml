name: Release

on:
  push:
    branches:
      - main

concurrency: release

env:
  HUSKY: 0

permissions:
  contents: read # for checkout

jobs:
  release:
    name: Release
    runs-on: ubuntu-24.04
    environment: release
    permissions:
      contents: write # to be able to publish a GitHub release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
      id-token: write # to enable use of OIDC for npm provenance
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - name: Installing dependencies
        run: pnpm install --frozen-lockfile

      # https://github.com/pnpm/pnpm/issues/7909
      # - name: Verify the integrity of provenance attestations and registry signatures for installed dependencies
      #   run: npm audit signatures

      # - name: Debug OIDC
      #   run: |
      #     TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
      #       "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm" | jq -r '.value')
      #     echo "Token present: $([ -n "$TOKEN" ] && echo yes || echo no)"
      #     # Decode the payload (middle part of JWT) without verifying signature
      #     echo $TOKEN | cut -d. -f2 | base64 -d 2>/dev/null | jq .
      #   env:
      #     ACTIONS_ID_TOKEN_REQUEST_TOKEN: ${{ env.ACTIONS_ID_TOKEN_REQUEST_TOKEN }}
      #     ACTIONS_ID_TOKEN_REQUEST_URL: ${{ env.ACTIONS_ID_TOKEN_REQUEST_URL }}

      - name: Show npmrc files
        run: |
          echo "=== project .npmrc ===" && cat .npmrc 2>/dev/null || echo "none"
          echo "=== home .npmrc ===" && cat ~/.npmrc 2>/dev/null || echo "none"
          echo "=== pnpm config ===" && pnpm config list

      - name: Check npm publish env
        run: |
          echo "=== which npm ===" && which npm
          echo "=== npm version ===" && npm --version
          echo "=== which pnpm ===" && which pnpm
          echo "=== node version ===" && node --version
          echo "=== ACTIONS_ID_TOKEN_REQUEST_URL set ==="
          [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ] && echo "yes" || echo "NO - THIS IS THE PROBLEM"
        env:
          ACTIONS_ID_TOKEN_REQUEST_URL: ${{ env.ACTIONS_ID_TOKEN_REQUEST_URL }}

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm exec semantic-release --debug 2>&1 | tee /tmp/sr-debug.log
          echo "=== .npmrc after release ==="
          cat ~/.npmrc 2>/dev/null || echo "none"
          cat .npmrc 2>/dev/null || echo "none"
          echo "=== sr debug log (npm publish lines) ==="
          grep -i "npm\|npmrc\|auth\|provenance\|publish" /tmp/sr-debug.log
